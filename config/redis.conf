# Redis configuration for KATO pattern metadata storage
# Base configuration: pure in-memory mode (no persistence)
# Enable persistence with REDIS_PERSISTENCE=true in .env
# See: ./kato-manager.sh enable-persistence (deployment)

# Persistence disabled by default (in-memory mode)
# WARNING: Without persistence, ALL Redis data (pattern frequency, symbol
# stats, global metadata, pre-computed metrics) is lost on container restart.
# This causes zero prediction metrics since ClickHouse patterns survive but
# Redis metadata does not. Set REDIS_PERSISTENCE=true in .env to enable.
# When REDIS_PERSISTENCE=true is set, persistence flags are added
# via docker compose command-line overrides
save ""
appendonly no
dir /data

# Memory management
maxmemory 8gb
# Evict least recently used keys if memory full
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Security
# Disabled for Docker network (kato-network is isolated)
protected-mode no
# Bind to all interfaces (Docker internal network)
bind 0.0.0.0 ::
