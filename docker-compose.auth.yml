# Authentication override for KATO services
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.auth.yml up -d
#
# IMPORTANT: Set credentials in .env BEFORE enabling this override.
# An empty QDRANT_API_KEY will cause Qdrant to reject ALL requests.
#
# Required .env variables:
#   QDRANT_API_KEY=your_secret_key_here
#   REDIS_PASSWORD=your_redis_password        (optional)
#   CLICKHOUSE_PASSWORD=your_clickhouse_pass   (optional)

services:
  qdrant:
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
